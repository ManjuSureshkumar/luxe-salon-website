<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxe Salon-Membership-Booking1</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body class="booking-page">

<div class="navbar">

    <!-- Frame 1707480871 -->
    <div class="logo">
        <img src="Images/c.png" alt="spa icon">
        <span>Luxe Salon</span>
    </div>

    <!-- Frame 1707480873 -->
    <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="service.html">Services</a>
        <a href="membership.html">Membership</a>
    </div>

    <!-- RIGHT: PROFILE IMAGE -->
    <div class="profile"><a href="profile.html">
        <img src="Images/profile.jpg" alt="profile"></a>
    </div>
</div>

<div class="booking-container">

    <h1 class="section-title">Your booking</h1>

    <!-- SERVICE -->
    <div class="booking-row">
        <div>
            <label>Service</label>
            <select>
                <option>Select</option>
                <option>Haircut</option>
                <option>Facial</option>
            </select>
        </div>
        <button class="edit-btn">Edit</button>
    </div>

    <!-- STYLIST -->
    <div class="booking-row">
        <div>
            <label>Stylist</label>
            <input type="text" placeholder="Select Stylist">
        </div>
        <button class="edit-btn">Edit</button>
    </div>

    <!-- DATE -->
    <div class="booking-row">
        <div>
            <label>Date</label>
            <input type="date">
        </div>
        <button class="edit-btn">Edit</button>
    </div>

    <!-- TIME -->
    <div class="booking-row">
        <div>
            <label>Time</label>
            <input type="time">
        </div>
        <button class="edit-btn">Edit</button>
    </div>

    <!-- TOTAL -->
    <div class="total-row">
        <h2>Total</h2>
        <span>$120</span>
    </div>

    <!-- BUTTON -->
    <a href="securepay.html">
  <button class="pay-btn">Proceed to Payment</button>
</a>

</div>
</body>
</html>
